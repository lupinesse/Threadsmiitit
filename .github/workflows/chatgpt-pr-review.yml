name: ChatGPT PR Review

# Five-job AI review dialogue:
#
#   Phase 1 — chatgpt-review: ChatGPT posts independent inline threads.
#
#   Phase 2 — claude-responds: Claude reads ChatGPT's threads, replies to
#   each, resolves them, and posts a synthesis. This runs only after Phase 1.
#
#   Phase 3 — claude-final-review: Claude posts a convergence summary of the
#   Phase 1–2 dialogue (thread outcomes + any independent gaps). Replaces the
#   standalone /pr-review run.
#
#   Phase 4 — chatgpt-responds: ChatGPT reads Claude's convergence summary and
#   verifies agreed fixes, challenges counter-positions, or flags regressions.
#
#   merge-gate: Queries all unresolved ChatGPT threads. Fails if any remain,
#   blocking merge. Succeeds only when ChatGPT has no outstanding findings.
#
# Note: Claude's standalone pr-review.yml is gated to skip PRs that meet the
# size threshold — this workflow handles Claude's review for those PRs instead.
#
# Triggers:
#   1. 'labeled' event with label == 'chatgpt-review' — manual override
#   2. 'synchronize' (force push / new commit) — only fires if ChatGPT has not
#      already reviewed this PR, closing the race where the 'opened' event run
#      is cancelled by a rapid force push before Phase 1 can start.
#   3. 'opened' / 'reopened' — size threshold evaluated inline on first open
#      ≥ 200 source-line changes OR ≥ 4 source files changed
#      Generated files excluded: script.js, styles.css, docs/*.html, package-lock.json
#
# Required secrets:
#   OPENAI_API_KEY               — OpenAI API key
#   CLAUDE_CODE_OAUTH_TOKEN      — Claude subscription token (`claude setup-token`)
#   CHATGPT_REVIEWER_APP_ID      — Client ID of the "ChatGPT Reviewer" GitHub App
#   CHATGPT_REVIEWER_PRIVATE_KEY — .pem private key of the same App
#   CLAUDE_REVIEWER_APP_ID       — Client ID of the "Claude Reviewer" GitHub App
#   CLAUDE_REVIEWER_PRIVATE_KEY  — .pem private key of the same App
#
# Required permission:
#   Settings > Actions > General > Workflow permissions > Read and write

on:
  pull_request:
    types: [labeled, opened, reopened, synchronize]

# One full dialogue cycle per PR at a time; never cancel an in-progress run.
concurrency:
  group: chatgpt-review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:

  # ─── Phase 1: ChatGPT independent review ──────────────────────────────────
  chatgpt-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}

    steps:
      - name: Decide whether to run
        id: gate
        uses: actions/github-script@v9
        with:
          script: |
            const LABEL           = 'chatgpt-review';
            const LINES_THRESHOLD = 200;
            const FILES_THRESHOLD = 4;
            const GENERATED       = /^(script\.js|styles\.css|docs\/.+\.html|package-lock\.json)$/;
            const action          = context.payload.action;

            if (action === 'labeled') {
              const triggered = context.payload.label.name === LABEL;
              core.info(triggered
                ? 'Triggered by chatgpt-review label — will review.'
                : `Label "${context.payload.label.name}" applied — not chatgpt-review, skipping.`);
              core.setOutput('should_run', String(triggered));
              return;
            }

            if (action === 'synchronize') {
              const [comments, reviews] = await Promise.all([
                github.paginate(github.rest.issues.listComments, {
                  owner:        context.repo.owner,
                  repo:         context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  per_page:     100,
                }),
                github.paginate(github.rest.pulls.listReviews, {
                  owner:        context.repo.owner,
                  repo:         context.repo.repo,
                  pull_number:  context.payload.pull_request.number,
                  per_page:     100,
                }),
              ]);

              const isChatGPT = login => (login ?? '').toLowerCase().includes('chatgpt');
              const alreadyReviewed =
                comments.some(c => isChatGPT(c.user?.login)) ||
                reviews.some(r =>  isChatGPT(r.user?.login));

              if (alreadyReviewed) {
                core.info('ChatGPT has already reviewed this PR — skipping re-run on synchronize.');
                core.setOutput('should_run', 'false');
                return;
              }
              core.info('No prior ChatGPT review found — treating synchronize as a fresh open.');
            }

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner:       context.repo.owner,
                repo:        context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page:    100,
              }
            );

            const DOCS_ONLY = /\.(md|txt|rst)$|^(LICENSE|CODEOWNERS)$/i;
            const sourceFiles = files.filter(f => !GENERATED.test(f.filename));
            const totalLines  = sourceFiles.reduce((sum, f) => sum + f.additions + f.deletions, 0);
            const fileCount   = sourceFiles.length;

            if (sourceFiles.length > 0 && sourceFiles.every(f => DOCS_ONLY.test(f.filename))) {
              core.info(`PR only changes documentation (${fileCount} file(s)) — skipping review.`);
              core.setOutput('should_run', 'false');
              return;
            }

            const meetsThreshold = totalLines >= LINES_THRESHOLD || fileCount >= FILES_THRESHOLD;
            core.info(meetsThreshold
              ? `Meets size threshold (${fileCount} files, ${totalLines} lines) — will review.`
              : `Below both thresholds (${fileCount} files, ${totalLines} lines) — skipping.`);
            core.setOutput('should_run', String(meetsThreshold));

      - name: Check required secrets
        id: check-secrets
        if: steps.gate.outputs.should_run == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CHATGPT_APP_ID: ${{ secrets.CHATGPT_REVIEWER_APP_ID }}
        run: |
          if [ -z "$OPENAI_API_KEY" ] || [ -z "$CHATGPT_APP_ID" ]; then
            echo "::warning::OPENAI_API_KEY or CHATGPT_REVIEWER_APP_ID not configured — skipping ChatGPT review."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        if: steps.check-secrets.outputs.ok == 'true'
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Write diff
        if: steps.check-secrets.outputs.ok == 'true'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git diff "$BASE_SHA"..."$HEAD_SHA" \
            -- ':!script.js' ':!styles.css' ':!docs/*.html' ':!package-lock.json' \
            > pr.diff
          echo "Diff size: $(wc -l < pr.diff) lines"

      - name: Mint ChatGPT Reviewer App token
        id: chatgpt-token
        if: steps.check-secrets.outputs.ok == 'true'
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.CHATGPT_REVIEWER_APP_ID }}
          private-key: ${{ secrets.CHATGPT_REVIEWER_PRIVATE_KEY }}

      - name: Set up Node.js
        if: always() && steps.check-secrets.outputs.ok == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Code Review with ChatGPT
        if: always() && steps.check-secrets.outputs.ok == 'true'
        env:
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN:      ${{ steps.chatgpt-token.outputs.token || github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER:         ${{ github.event.pull_request.number }}
          HEAD_SHA:          ${{ github.event.pull_request.head.sha }}
          MODEL:             gpt-4o-2024-08-06
          MAX_DIFF_CHARS:    '30000'
          MAX_TOKENS:        '3072'
        run: node .github/scripts/chatgpt-review.mjs

  # ─── Phase 2: Claude responds to ChatGPT's findings ───────────────────────
  claude-responds:
    needs: chatgpt-review
    if: needs.chatgpt-review.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Write filtered diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git diff "$BASE_SHA"..."$HEAD_SHA" \
            -- ':!script.js' ':!styles.css' ':!docs/*.html' ':!package-lock.json' \
            > pr.diff
          echo "Diff size: $(wc -l < pr.diff) lines"

      - name: Mint Claude Reviewer App token
        id: claude-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.CLAUDE_REVIEWER_APP_ID }}
          private-key: ${{ secrets.CLAUDE_REVIEWER_PRIVATE_KEY }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Claude responds to ChatGPT's findings
        if: always()
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN:            ${{ steps.claude-token.outputs.token || github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER:         ${{ github.event.pull_request.number }}
          HEAD_SHA:          ${{ github.event.pull_request.head.sha }}
          MODEL:             claude-haiku-4-5-20251001
          MAX_DIFF_CHARS:    '15000'
        run: node .github/scripts/claude-chatgpt-dialogue.mjs

  # ─── Phase 3: Claude posts convergence summary ────────────────────────────
  claude-final-review:
    needs: [chatgpt-review, claude-responds]
    if: needs.chatgpt-review.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Write filtered diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git diff "$BASE_SHA"..."$HEAD_SHA" \
            -- ':!dist/' ':!*.lock' ':!docs/**/*.html' \
            > pr.diff
          echo "Diff size: $(wc -l < pr.diff) lines"

      - name: Check auth is present
        id: key-check
        env:
          OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -n "$OAUTH_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CLAUDE_CODE_OAUTH_TOKEN is not set — skipping convergence summary."
          fi

      - name: Mint Claude Reviewer App token
        id: claude-token
        if: steps.key-check.outputs.present == 'true'
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.CLAUDE_REVIEWER_APP_ID }}
          private-key: ${{ secrets.CLAUDE_REVIEWER_PRIVATE_KEY }}

      - name: Run convergence summary
        if: steps.key-check.outputs.present == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN:   ${{ steps.claude-token.outputs.token || github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER:  ${{ github.event.pull_request.number }}
          HEAD_SHA:   ${{ github.event.pull_request.head.sha }}
          MODEL:      claude-haiku-4-5-20251001
          MAX_DIFF_CHARS: '15000'
        run: node .github/scripts/claude-convergence-summary.mjs

  # ─── Phase 4: ChatGPT verifies fixes ──────────────────────────────────────
  chatgpt-responds:
    needs: [chatgpt-review, claude-final-review]
    if: needs.chatgpt-review.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Write filtered diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git diff "$BASE_SHA"..."$HEAD_SHA" \
            -- ':!script.js' ':!styles.css' ':!docs/*.html' ':!package-lock.json' \
            > pr.diff
          echo "Diff size: $(wc -l < pr.diff) lines"

      - name: Mint ChatGPT Reviewer App token
        id: chatgpt-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.CHATGPT_REVIEWER_APP_ID }}
          private-key: ${{ secrets.CHATGPT_REVIEWER_PRIVATE_KEY }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: ChatGPT responds to Claude's verdict
        if: always()
        env:
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN:      ${{ steps.chatgpt-token.outputs.token || github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER:         ${{ github.event.pull_request.number }}
          HEAD_SHA:          ${{ github.event.pull_request.head.sha }}
          MODEL:             gpt-4o-mini
          MAX_DIFF_CHARS:    '25000'
          MAX_TOKENS:        '3072'
          MAX_CONTEXT_CHARS: '3000'
        run: node .github/scripts/chatgpt-claude-dialogue.mjs

  # ─── Merge gate ───────────────────────────────────────────────────────────
  merge-gate:
    name: All ChatGPT findings resolved
    needs: [chatgpt-review, chatgpt-responds]
    if: always() && needs.chatgpt-review.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read

    steps:
      - name: Check for unresolved ChatGPT threads
        uses: actions/github-script@v9
        with:
          script: |
            const result = await github.graphql(`
              query($owner:String!, $name:String!, $number:Int!) {
                repository(owner:$owner, name:$name) {
                  pullRequest(number:$number) {
                    reviewThreads(first:100) {
                      nodes {
                        isResolved
                        comments(first:1) {
                          nodes {
                            author { login }
                            body
                            path
                            originalLine
                          }
                        }
                      }
                    }
                  }
                }
              }
            `, {
              owner:  context.repo.owner,
              name:   context.repo.repo,
              number: context.payload.pull_request.number,
            });

            const unresolved = result.repository.pullRequest.reviewThreads.nodes
              .filter(t => {
                if (t.isResolved) return false;
                const login = (t.comments.nodes[0]?.author?.login || '').toLowerCase();
                return login.includes('chatgpt');
              });

            if (unresolved.length === 0) {
              core.info('No unresolved ChatGPT threads — PR is clear to merge.');
            } else {
              const list = unresolved.map(t => {
                const c = t.comments.nodes[0];
                return `  • ${c.path}:${c.originalLine} — ${c.body.slice(0, 80).replace(/\n/g, ' ')}…`;
              }).join('\n');
              core.setFailed(
                `${unresolved.length} unresolved ChatGPT finding(s):\n${list}\n\nResolve all threads before merging.`
              );
            }
