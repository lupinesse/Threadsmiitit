name: Claude PR Review

# Posts an automated adversarial code review as a PR comment on every push.
# Uses the /pr-review skill, which reads the diff written to pr.diff and
# audits changed files against the project's CLAUDE.md quality standard.
#
# This workflow only runs for PRs *below* the ChatGPT dialogue size threshold
# (< 200 source-line changes AND < 4 source files). For larger PRs, the full
# AI dialogue in chatgpt-pr-review.yml handles Claude's review as a dedicated
# phase — after Claude has already responded to ChatGPT's findings.
#
# Required secrets:
#   CLAUDE_CODE_OAUTH_TOKEN     — Claude subscription token (`claude setup-token`)
#   CLAUDE_REVIEWER_APP_ID      — App ID of the "Claude Reviewer" GitHub App
#   CLAUDE_REVIEWER_PRIVATE_KEY — .pem private key of the same App

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check PR size — skip if dialogue threshold is met
        id: size-gate
        uses: actions/github-script@v9
        with:
          script: |
            const LINES_THRESHOLD = 200;
            const FILES_THRESHOLD = 4;
            const GENERATED       = /^(script\.js|styles\.css|docs\/.+\.html|package-lock\.json)$/;
            const DOCS_ONLY       = /\.(md|txt|rst)$|^(LICENSE|CODEOWNERS)$/i;

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner:       context.repo.owner,
                repo:        context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page:    100,
              }
            );

            const sourceFiles = files.filter(f => !GENERATED.test(f.filename));
            const totalLines  = sourceFiles.reduce((sum, f) => sum + f.additions + f.deletions, 0);
            const fileCount   = sourceFiles.length;

            if (sourceFiles.length > 0 && sourceFiles.every(f => DOCS_ONLY.test(f.filename))) {
              core.info(`PR only changes documentation (${fileCount} file(s)) — skipping review.`);
              core.setOutput('should_run', 'false');
              return;
            }

            const dialogueWillRun = totalLines >= LINES_THRESHOLD || fileCount >= FILES_THRESHOLD;
            core.info(dialogueWillRun
              ? `PR meets dialogue threshold (${fileCount} files, ${totalLines} lines) — chatgpt-pr-review.yml handles Claude's review.`
              : `PR below dialogue threshold (${fileCount} files, ${totalLines} lines) — running standalone review.`);
            core.setOutput('should_run', String(!dialogueWillRun));

      - name: Check out repository
        if: steps.size-gate.outputs.should_run == 'true'
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        if: steps.size-gate.outputs.should_run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Claude Code
        if: steps.size-gate.outputs.should_run == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Write diff to pr.diff
        if: steps.size-gate.outputs.should_run == 'true'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git diff "$BASE_SHA"..."$HEAD_SHA" > pr.diff
          echo "Diff size: $(wc -l < pr.diff) lines"

      - name: Check auth is present
        id: key-check
        if: steps.size-gate.outputs.should_run == 'true'
        env:
          OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -n "$OAUTH_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CLAUDE_CODE_OAUTH_TOKEN is not set — skipping automated review."
          fi

      - name: Run PR review
        if: steps.key-check.outputs.present == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude -p "/pr-review" \
            --model claude-sonnet-4-6 \
            --max-turns 20 \
                           "Bash(git log:*)" "Bash(git diff:*)" \
                           "Bash(git show:*)" "Bash(cat:*)" "Bash(wc:*)" \
            > review-raw.json 2>review-stderr.txt || true
          [ -s review-stderr.txt ] && echo "--- claude stderr ---" && cat review-stderr.txt
          if jq -e '.result' review-raw.json > /dev/null 2>&1; then
            jq -r '.result' review-raw.json > review-output.txt
          else
            cat review-raw.json review-stderr.txt > review-output.txt 2>/dev/null || true
          fi
          echo "Review complete ($(wc -l < review-output.txt) lines)"

      - name: Mint Claude Reviewer App token
        id: claude-token
        if: always() && steps.key-check.conclusion != 'skipped'
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.CLAUDE_REVIEWER_APP_ID }}
          private-key: ${{ secrets.CLAUDE_REVIEWER_PRIVATE_KEY }}

      - name: Post or update review as PR comment
        if: always() && steps.key-check.conclusion != 'skipped'
        env:
          GH_TOKEN: ${{ steps.claude-token.outputs.token || github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          MARKER='<!-- claude-pr-review-comment -->'
          if [ -f review-output.txt ]; then
            {
              echo "$MARKER"
              cat review-output.txt
              echo ""
              echo "---"
              echo "*Automated review by [Claude Code](https://claude.ai/claude-code) \`/pr-review\` · commit \`${HEAD_SHA::7}\`*"
            } > comment-body.txt
          else
            {
              echo "$MARKER"
              echo "> ⚠️ Automated review skipped — \`CLAUDE_CODE_OAUTH_TOKEN\` is not set. Add it in **Settings → Secrets and variables → Actions** to enable AI code review."
            } > comment-body.txt
          fi

          PREV_ID=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" --paginate \
            --jq "[.[] | select(.body | contains(\"$MARKER\"))] | last | .id // empty")

          if [ -n "$PREV_ID" ]; then
            echo "Updating existing comment $PREV_ID"
            gh api "repos/$REPO/issues/comments/$PREV_ID" \
              --method PATCH \
              --field body=@comment-body.txt
          else
            echo "Posting new comment"
            gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
              --method POST \
              --field body=@comment-body.txt
          fi
