name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual escape hatch: workflow_dispatch runs via a direct API call rather
  # than a webhook-delivered event, so it's available on demand even if a
  # push/synchronize event to an open PR doesn't trigger a run.
  workflow_dispatch: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Docs (fail on JSDoc parse errors)
        run: npm run docs

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Fails the build on high/critical vulnerabilities only. Dependabot
      # (.github/dependabot.yml) opens weekly PRs for everything else,
      # including the moderate-severity transitive vulnerabilities
      # currently open in @netlify/blobs' OpenTelemetry dependency chain
      # (no fix available without a semver-major @netlify/blobs bump).
      - name: Audit dependencies (high/critical)
        run: npm audit --audit-level=high
